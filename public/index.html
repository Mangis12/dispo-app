const LT_MONTHS = ['sausis','vasaris','kovas','balandis','gegužė','birželis','liepa','rugpjūtis','rugsėjis','spalis','lapkritis','gruodis'];
const LT_DAYS = ['Pr','An','Tr','Kt','Pn','Še','Se'];
const LT_DAYS_SHORT = ['sek','pir','ant','tre','ket','pen','šeš'];

function parseISO(s){ return new Date(s); }
function isValid(d){ return d instanceof Date && !isNaN(d); }
function formatDate(d, fmt){
  if(!d||!isValid(d)) return '?';
  const pad = n => String(n).padStart(2,'0');
  return fmt
    .replace('yyyy', d.getFullYear())
    .replace('MMMM', LT_MONTHS[d.getMonth()])
    .replace('MMM',  LT_MONTHS[d.getMonth()].slice(0,3))
    .replace('MM',   pad(d.getMonth()+1))
    .replace('dd',   pad(d.getDate()))
    .replace('d',    d.getDate())
    .replace('HH',   pad(d.getHours()))
    .replace('mm',   pad(d.getMinutes()))
    .replace('EEE',  LT_DAYS_SHORT[d.getDay()])
    .replace('EE',   LT_DAYS[d.getDay() === 0 ? 6 : d.getDay()-1]);
}
function addDays(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function subDays(d,n){ return addDays(d,-n); }
function addMonths(d,n){ const r=new Date(d); r.setMonth(r.getMonth()+n); return r; }
function subMonths(d,n){ return addMonths(d,-n); }
function differenceInDays(a,b){ return Math.round((a-b)/(1000*60*60*24)); }
function isBefore(a,b){ return a<b; }
function isAfter(a,b){ return a>b; }
function isSameDay(a,b){ return a.toDateString()===b.toDateString(); }
function isSameMonth(a,b){ return a.getMonth()===b.getMonth()&&a.getFullYear()===b.getFullYear(); }
function startOfMonth(d){ return new Date(d.getFullYear(),d.getMonth(),1); }
function endOfMonth(d){ return new Date(d.getFullYear(),d.getMonth()+1,0); }
function getDaysInMonth(d){ return endOfMonth(d).getDate(); }
function startOfWeek(d){ const r=new Date(d); const day=r.getDay(); const diff=day===0?-6:1-day; r.setDate(r.getDate()+diff); return r; }
function endOfWeek(d){ return addDays(startOfWeek(d),6); }
function eachDayOfInterval(s,e){ const days=[]; let c=new Date(s); while(c<=e){days.push(new Date(c));c=addDays(c,1);} return days; }
function todayStr(){ return new Date().toISOString().slice(0,10); }
function uid(){ return Math.random().toString(36).substr(2,9); }
function cn(...args){ return args.filter(Boolean).join(' '); }

    amber:'bg-amber-50 text-amber-700 border-amber-200',
    purple:'bg-purple-50 text-purple-700 border-purple-100'
  }[v];
  return <span className={cn("inline-flex items-center px-2 py-0.5 rounded-md text-xs font-bold border",cls)}>{children}</span>;
}

function Modal({title, onClose, children}){
  return (
    <div className="fixed inset-0 bg-[#003087]/60 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-slate-100">
        <div className="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-[#003087]">
          <h2 className="text-base font-bold text-white">{title}</h2>
          <button onClick={onClose} className="p-1.5 hover:bg-white/20 rounded-lg text-white/70 hover:text-white transition-colors">✕</button>
        </div>
        <div className="p-6">{children}</div>
      </div>
    </div>
  );
}

const ic = "w-full bg-stone-50 border border-stone-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-900/10 focus:border-stone-400 transition-all";
const sc = "w-full bg-stone-50 border border-stone-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-stone-900/10 transition-all";
function Field({label,children}){
  return <div className="space-y-1.5"><label className="text-xs font-bold uppercase tracking-wider text-stone-400">{label}</label>{children}</div>;
}

function StatCard({label,value,sub,color}){
  return (
    <div className={cn("rounded-2xl p-5 border",color)}>
      <p className="text-xs font-bold uppercase tracking-widest opacity-70 mb-1">{label}</p>
      <p className="text-4xl font-black">{value}</p>
      {sub&&<p className="text-xs opacity-60 mt-1">{sub}</p>}
    </div>
  );
}

function TabBtn({active,onClick,label,badge}){
  return (
    <button onClick={onClick} className={cn("relative px-3.5 py-2 rounded-xl text-sm font-semibold transition-all whitespace-nowrap",active?"bg-[#CC1427] text-white shadow-md":"text-white/70 hover:text-white hover:bg-white/10")}>
      {label}
      {badge>0&&<span className="absolute -top-1 -right-1 w-4 h-4 bg-amber-400 text-[#003087] text-xs font-black rounded-full flex items-center justify-center">{badge>9?'9+':badge}</span>}
    </button>
  );
}

function MonthNav({value,onChange}){
  return (
    <div className="flex items-center gap-1 bg-white border border-stone-200 rounded-xl p-1">
      <button onClick={()=>onChange(subMonths(value,1))} className="p-1.5 hover:bg-stone-100 rounded-lg transition-colors text-stone-400">◀</button>
      <span className="px-3 text-xs font-bold min-w-[120px] text-center">{formatDate(value,'MMMM yyyy')}</span>
      <button onClick={()=>onChange(addMonths(value,1))} className="p-1.5 hover:bg-stone-100 rounded-lg transition-colors text-stone-400">▶</button>
    </div>
  );
}

function EmptyState({text}){
  return <div className="py-16 text-center bg-white rounded-2xl border border-dashed border-stone-200"><p className="text-sm text-stone-400 font-medium">{text}</p></div>;
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const load = (k,fb) => { try{const s=localStorage.getItem(k);return s?JSON.parse(s):fb;}catch{return fb;} };

  const [drivers,setDrivers] = React.useState(()=>load('dv4',INIT_DRIVERS));
  const [cars,setCars]       = React.useState(()=>load('ca4',INIT_CARS));
  const [history,setHistory] = React.useState(()=>load('hi4',[]));
  const [plans,setPlans]     = React.useState(()=>{
    const raw=load('pl4',[]);
    return raw.filter((p,i,a)=>i===a.findIndex(x=>x.carNumber===p.carNumber&&x.date===p.date&&x.leavingDriverId===p.leavingDriverId&&x.incomingDriverId===p.incomingDriverId));
  });
  const [carAssignments,setCarAssignments] = React.useState(()=>{
    const saved=load('cas4',[]);
    if(saved.length===0){
      const dd=load('dv4',INIT_DRIVERS);
      return dd.filter(d=>d.status==='Reise'&&d.currentCar!=='Nėra'&&d.startDate).map(d=>({id:uid(),carNumber:d.currentCar,driverId:d.id,driverName:d.name,startDate:d.startDate,endDate:null}));
    }
    return saved;
  });

  const [tab,setTab]             = React.useState('dashboard');
  const [selMonth,setSelMonth]   = React.useState(new Date());
  const [selDay,setSelDay]       = React.useState(null);
  const [toast,setToast]         = React.useState(null);
  const [newReturn,setNewReturn] = React.useState(formatDate(addDays(new Date(),42),'yyyy-MM-dd'));

  // Modal state
  const [addDrvOpen,setAddDrvOpen]     = React.useState(false);
  const [addCarOpen,setAddCarOpen]     = React.useState(false);
  const [editCarOpen,setEditCarOpen]   = React.useState(false);
  const [tripOpen,setTripOpen]         = React.useState(false);
  const [homeOpen,setHomeOpen]         = React.useState(false);
  const [editDrvOpen,setEditDrvOpen]   = React.useState(false);
  const [confirmData,setConfirmData]   = React.useState(null);
  const [selDrvTrip,setSelDrvTrip]     = React.useState(null);
  const [selCarAssign,setSelCarAssign] = React.useState(null);
  const [selDrvHome,setSelDrvHome]     = React.useState(null);
  const [selDrvEdit,setSelDrvEdit]     = React.useState(null);
  const [selCarEdit,setSelCarEdit]     = React.useState(null);

  // Planning
  const [selTripId,setSelTripId]   = React.useState('');
  const [replDate,setReplDate]     = React.useState(todayStr());
  const [selHomeId,setSelHomeId]   = React.useState('');
  const [workDate,setWorkDate]     = React.useState(todayStr());

  // History
  const [histMode,setHistMode]   = React.useState('upcoming');
  const [histMonth,setHistMonth] = React.useState(new Date());
  const [grafYear,setGrafYear]   = React.useState(new Date().getFullYear());

  // ── Trip planner (fleet) ─────────────────────────────────────
  const BASE = {lat:54.9127, lng:23.9417, name:'Ateities pl. 23, Kaunas'};
  const VEH_COLORS = ['#003087','#CC1427','#15803d','#7c3aed','#c2780c','#0891b2'];
  const mkVehicle = (idx) => ({id:uid(),number:'',capacity:4,color:VEH_COLORS[idx]||VEH_COLORS[0],stops:[],additionalWork:''});

  const [tripFleet,setTripFleet]           = React.useState([mkVehicle(0)]);
  const [activeVehIdx,setActiveVehIdx]     = React.useState(0);
  const [tripSearch,setTripSearch]         = React.useState('');
  const [tripSearching,setTripSearching]   = React.useState(false);
  const [routeInfo,setRouteInfo]           = React.useState({});  // {vehicleId:{km,h}}
  const leafletMap   = React.useRef(null);
  const leafletObjs  = React.useRef([]);
  const stopIdx      = React.useRef(1);

  // mode: 'driver' | 'task' — refs needed for map click closure
  const [tripMode, setTripMode]           = React.useState('driver');
  const tripModeRef      = React.useRef('driver');
  const activeVehIdxRef  = React.useRef(0);
  const [pendingTaskStop, setPendingTaskStop] = React.useState(null); // {lat,lng,city}
  const [pendingTaskDesc, setPendingTaskDesc] = React.useState('');

  React.useEffect(()=>{ tripModeRef.current=tripMode; },[tripMode]);
  React.useEffect(()=>{ activeVehIdxRef.current=activeVehIdx; },[activeVehIdx]);

  const activeVeh = tripFleet[activeVehIdx] || tripFleet[0];

  // fleet helpers
  const updFleet = (id,fn) => setTripFleet(p=>p.map(v=>v.id===id?fn(v):v));
  const addVehicle = () => {
    if(tripFleet.length>=6){showT('Maksimalus 6 transporto priemonės','error');return;}
    const nv=mkVehicle(tripFleet.length);
    setTripFleet(p=>[...p,nv]);
    setActiveVehIdx(tripFleet.length);
  };
  const removeVehicle = (id) => {
    if(tripFleet.length<=1){showT('Turi likti bent viena priemonė','error');return;}
    setTripFleet(p=>p.filter(v=>v.id!==id));
    setActiveVehIdx(0);
  };

  // stop helpers
  const addStop = (vehicleId,stop) => updFleet(vehicleId,v=>({...v,stops:[...v.stops,stop]}));
  const removeStop = (vehicleId,stopId) => updFleet(vehicleId,v=>({...v,stops:v.stops.filter(s=>s.id!==stopId)}));
  const moveStop = (vehicleId,stopId,dir) => updFleet(vehicleId,v=>{
    const arr=[...v.stops]; const i=arr.findIndex(s=>s.id===stopId);
    if(i<0) return v; const j=i+dir; if(j<0||j>=arr.length) return v;
    [arr[i],arr[j]]=[arr[j],arr[i]]; return {...v,stops:arr};
  });
  const updStop = (vehicleId,stopId,field,val) => updFleet(vehicleId,v=>({...v,stops:v.stops.map(s=>s.id===stopId?{...s,[field]:val}:s)}));

  // Route distance via OSRM
  const calcRoute = async (veh) => {
    if(veh.stops.length===0){setRouteInfo(p=>({...p,[veh.id]:null}));return;}
    const pts=[BASE,...veh.stops,BASE];
    const coords=pts.map(p=>`${p.lng},${p.lat}`).join(';');
    try{
      const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${coords}?overview=false`);
      const d=await r.json();
      if(d.routes?.[0]){
        setRouteInfo(p=>({...p,[veh.id]:{km:Math.round(d.routes[0].distance/1000),h:Math.round(d.routes[0].duration/360)/10}}));
      }
    }catch(_){}
  };

  // Recalculate when stops change for active vehicle
  React.useEffect(()=>{ if(activeVeh) calcRoute(activeVeh); },[JSON.stringify(activeVeh?.stops)]);

  // Init Leaflet map
  React.useEffect(()=>{
    if(tab!=='trip') return;
    const init=()=>{
      if(leafletMap.current||!window.L) return;
      const el=document.getElementById('trip-map');
      if(!el) return;
      const map=window.L.map('trip-map').setView([BASE.lat,BASE.lng],7);
      window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
        attribution:'© <a href="https://openstreetmap.org">OSM</a>'
      }).addTo(map);
      // Base marker
      const baseIcon=window.L.divIcon({
        html:`<div style="background:#15803d;color:white;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;border:3px solid white;box-shadow:0 3px 8px rgba(0,0,0,0.4)">🏢</div>`,
        iconSize:[32,32],iconAnchor:[16,16],className:''
      });
      window.L.marker([BASE.lat,BASE.lng],{icon:baseIcon,zIndexOffset:1000})
        .addTo(map).bindPopup(`<b>🏢 Bazė</b><br>${BASE.name}`);
      map.on('click',async e=>{
        const{lat,lng}=e.latlng;
        let city=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
        try{
          const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json`);
          const d=await r.json();
          city=d.address?.city||d.address?.town||d.address?.village||d.address?.municipality||city;
        }catch(_){}
        if(tripModeRef.current==='task'){
          setPendingTaskStop({lat,lng,city});
          setPendingTaskDesc('');
        } else {
          setTripFleet(p=>p.map((v,i)=>i===activeVehIdxRef.current
            ?{...v,stops:[...v.stops,{id:stopIdx.current++,lat,lng,city,type:'driver',driverId:'',planId:'',addWork:''}]}
            :v));
        }
      });
      leafletMap.current=map;
    };
    setTimeout(init,200);
  },[tab]);

  // Redraw all fleet markers/routes on map
  React.useEffect(()=>{
    const map=leafletMap.current;
    if(!map||!window.L) return;
    leafletObjs.current.forEach(o=>{try{o.remove();}catch(_){}});
    leafletObjs.current=[];
    tripFleet.forEach(veh=>{
      const col=veh.color;
      veh.stops.forEach((s,i)=>{
        const isActive=veh.id===activeVeh?.id;
        const isTask=s.type==='task';
        const sz=isActive?28:22; const brd=isActive?3:2;
        const bg=isTask?'#d97706':col;
        const inner=isTask?`<span style="font-size:${isActive?14:11}px">📦</span>`
          :`<span style="font-weight:900;font-size:${isActive?12:10}px">${i+1}</span>`;
        const pin=window.L.divIcon({
          html:`<div style="background:${bg};color:white;width:${sz}px;height:${sz}px;border-radius:${isTask?'6px':'50%'};display:flex;align-items:center;justify-content:center;border:${brd}px solid white;box-shadow:0 3px 8px rgba(0,0,0,0.4);opacity:${isActive?1:0.7}">${inner}</div>`,
          iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],className:''
        });
        const popup=isTask
          ?`<b>📦 Užduotis ${i+1}</b><br>${s.city}<br><i>${s.taskDesc||'(nėra aprašymo)'}</i>`
          :`<b>${veh.number||'?'} · ${i+1}</b><br>${s.city}`;
        const mk=window.L.marker([s.lat,s.lng],{icon:pin}).addTo(map).bindPopup(popup);
        leafletObjs.current.push(mk);
      });
      if(veh.stops.length>0){
        const pts=[[BASE.lat,BASE.lng],...veh.stops.map(s=>[s.lat,s.lng]),[BASE.lat,BASE.lng]];
        const line=window.L.polyline(pts,{color:col,weight:veh.id===activeVeh?.id?4:2,opacity:veh.id===activeVeh?.id?0.9:0.5,dashArray:'10,6'}).addTo(map);
        leafletObjs.current.push(line);
      }
    });
  },[tripFleet,activeVehIdx]);

  // City search
  const searchCity=async()=>{
    if(!tripSearch.trim()) return;
    setTripSearching(true);
    try{
      const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(tripSearch)}&format=json&limit=1`);
      const d=await r.json();
      if(d[0]){
        const{lat,lon,display_name}=d[0];
        const city=display_name.split(',')[0];
        leafletMap.current?.setView([+lat,+lon],11);
        const vid=activeVeh.id;
        setTripFleet(p=>p.map(v=>v.id===vid?{...v,stops:[...v.stops,{id:stopIdx.current++,lat:+lat,lng:+lon,city,type:tripModeRef.current==='task'?'task':'driver',driverId:'',planId:'',addWork:'',taskDesc:''}]}:v));
        setTripSearch('');
      }else{showT('Miestas nerastas','error');}
    }catch(_){showT('Klaida','error');}
    setTripSearching(false);
  };

  // Filters
  const [drvF,setDrvF] = React.useState({ct:'',sp:'',q:''});
  const [carF,setCarF] = React.useState({reg:'',type:'',q:''});

  // Persist
  React.useEffect(()=>{
    localStorage.setItem('dv4',JSON.stringify(drivers));
    localStorage.setItem('ca4',JSON.stringify(cars));
    localStorage.setItem('hi4',JSON.stringify(history));
    localStorage.setItem('pl4',JSON.stringify(plans));
    localStorage.setItem('cas4',JSON.stringify(carAssignments));
  },[drivers,cars,history,plans,carAssignments]);

  React.useEffect(()=>{ if(toast){const t=setTimeout(()=>setToast(null),3200);return()=>clearTimeout(t);} },[toast]);

  React.useEffect(()=>{
    if(!selTripId) return;
    if(selTripId.startsWith('CAR:')){
      const car=cars.find(c=>c.number===selTripId.replace('CAR:',''));
      setReplDate(car?.activeFrom||todayStr());
    } else {
      const d=drivers.find(x=>x.id===selTripId);
      if(d?.plannedReturnDate) setReplDate(d.plannedReturnDate);
    }
  },[selTripId]);

  React.useEffect(()=>{
    if(!selHomeId) return;
    const d=drivers.find(x=>x.id===selHomeId);
    if(d?.readinessDate) setWorkDate(d.readinessDate);
  },[selHomeId]);

  // Helpers
  const logH = (driverId,driverName,action,details,carNumber,date) => {
    setHistory(p=>[{id:uid(),timestamp:formatDate(new Date(),'yyyy-MM-dd HH:mm'),driverId,driverName,action,details,carNumber,date},...p]);
  };
  const showT = (msg,type='success') => setToast({msg,type});

  // Driver actions
  const addDriver = (d) => {
    const drv={...d,id:uid()};
    setDrivers(p=>[...p,drv]);
    logH(drv.id,drv.name,'Pridėtas','Naujas vairuotojas');
    setAddDrvOpen(false); showT(drv.name+' pridėtas');
  };

  const updDriver = (id,upd) => {
    setDrivers(p=>p.map(d=>d.id===id?{...d,...upd}:d));
    if(upd.name) setPlans(p=>p.map(pl=>({...pl,incomingDriverName:pl.incomingDriverId===id?upd.name:pl.incomingDriverName,leavingDriverName:pl.leavingDriverId===id?upd.name:pl.leavingDriverName})));
  };

  const delDriver = (id) => {
    const d=drivers.find(x=>x.id===id); if(!d) return;
    setPlans(p=>p.filter(pl=>pl.incomingDriverId!==id&&pl.leavingDriverId!==id));
    setDrivers(p=>p.filter(x=>x.id!==id));
    logH(id,d.name,'Ištrintas','Pašalintas iš sistemos');
    showT(d.name+' pašalintas');
  };

  const sendHome = (id,homeStatus,readinessDate) => {
    const d=drivers.find(x=>x.id===id); if(!d) return;
    const today=todayStr();
    updDriver(id,{status:'Namuose',currentCar:'Nėra',startDate:null,plannedReturnDate:null,homeStatus,readinessDate,lastTripEndDate:today});
    setCarAssignments(p=>p.map(a=>a.driverId===id&&a.endDate===null?{...a,endDate:today}:a));
    logH(id,d.name,'Išsiųstas namo',`Būsena: ${homeStatus}, Gali: ${readinessDate}`,'Nėra',today);
    setHomeOpen(false); setSelDrvHome(null); showT(d.name+' išsiųstas namo');
  };

  const sendToTrip = (id,carNumber,startDate,plannedReturn) => {
    const d=drivers.find(x=>x.id===id); if(!d) return;
    setCarAssignments(p=>{
      let u=p.map(a=>a.carNumber===carNumber&&a.endDate===null?{...a,endDate:startDate}:a);
      return [...u,{id:uid(),carNumber,driverId:id,driverName:d.name,startDate,endDate:null}];
    });
    updDriver(id,{status:'Reise',currentCar:carNumber,startDate,plannedReturnDate:plannedReturn,homeStatus:'Nėra',readinessDate:null});
    logH(id,d.name,'Išsiųstas į reisą',`Auto: ${carNumber}, Nuo: ${startDate}`,carNumber,startDate);
    setTripOpen(false); setSelDrvTrip(null); setSelCarAssign(null); showT(d.name+' išsiųstas į reisą');
  };

  // Car actions
  const addCar = (c) => { setCars(p=>[...p,{...c,id:uid()}]); setAddCarOpen(false); showT('Automobilis '+c.number+' pridėtas'); };
  const updCar = (id,upd) => { setCars(p=>p.map(c=>c.id===id?{...c,...upd}:c)); setEditCarOpen(false); setSelCarEdit(null); showT('Atnaujinta'); };
  const delCar = (id) => {
    const car=cars.find(c=>c.id===id); if(!car) return;
    const today=todayStr(); const ready=formatDate(addDays(new Date(),21),'yyyy-MM-dd');
    const inCar=drivers.filter(d=>d.currentCar===car.number);
    if(inCar.length>0){
      setDrivers(p=>p.map(d=>d.currentCar===car.number?{...d,status:'Namuose',currentCar:'Nėra',startDate:null,plannedReturnDate:null,homeStatus:'Poilsis',readinessDate:ready,lastTripEndDate:today}:d));
      setCarAssignments(p=>p.map(a=>a.carNumber===car.number&&a.endDate===null?{...a,endDate:today}:a));
    }
    setPlans(p=>p.filter(pl=>pl.carNumber!==car.number));
    setCars(p=>p.filter(c=>c.id!==id)); showT(car.number+' pašalintas');
  };

  // Plan actions
  const createPlan = (carNumber,leavingId,incomingId,date,retDate) => {
    if(plans.some(p=>p.carNumber===carNumber&&p.date===date&&p.status==='Suplanuota')){ showT('Šiai datai jau yra planas ('+carNumber+')','error'); return; }
    const leaving=leavingId?drivers.find(d=>d.id===leavingId):null;
    const incoming=drivers.find(d=>d.id===incomingId); if(!incoming) return;
    const plan={id:uid(),carNumber,leavingDriverId:leavingId||'NONE',leavingDriverName:leaving?.name||'Nėra',incomingDriverId:incomingId,incomingDriverName:incoming.name,date,status:'Suplanuota',newPlannedReturnDate:retDate};
    setPlans(p=>[plan,...p]);
    logH(incomingId,incoming.name,'Suplanuotas pakeitimas',`Auto: ${carNumber}, Data: ${date}`,carNumber,date);
    showT('Planas sukurtas: '+incoming.name+' → '+carNumber);
  };

  const delPlan = (id) => { setPlans(p=>p.filter(x=>x.id!==id)); showT('Planas atšauktas'); };

  const completePlan = (planId,execRet,actualDate) => {
    const plan=plans.find(p=>p.id===planId); if(!plan) return;
    const execDate=actualDate||plan.date;
    const retDate=execRet||plan.newPlannedReturnDate||formatDate(addDays(parseISO(execDate),42),'yyyy-MM-dd');
    const readiness=formatDate(addDays(parseISO(execDate),21),'yyyy-MM-dd');
    setPlans(p=>p.map(x=>x.id===planId?{...x,status:'Atlikta',date:execDate}:x));
    setDrivers(p=>p.map(d=>{
      if(d.id===plan.leavingDriverId&&plan.leavingDriverId!=='NONE') return{...d,status:'Namuose',currentCar:'Nėra',startDate:null,plannedReturnDate:null,homeStatus:'Poilsis',readinessDate:readiness,lastTripEndDate:execDate};
      if(d.id===plan.incomingDriverId) return{...d,status:'Reise',currentCar:plan.carNumber,startDate:execDate,plannedReturnDate:retDate,homeStatus:'Nėra',readinessDate:null};
      return d;
    }));
    setCarAssignments(p=>{
      const u=p.map(a=>(a.carNumber===plan.carNumber&&a.endDate===null)||(a.driverId===plan.leavingDriverId&&a.endDate===null)?{...a,endDate:execDate}:a);
      return [...u,{id:uid(),carNumber:plan.carNumber,driverId:plan.incomingDriverId,driverName:plan.incomingDriverName,startDate:execDate,endDate:null}];
    });
    logH(plan.incomingDriverId,plan.incomingDriverName,'Pakeitimas įvykdytas',`Auto: ${plan.carNumber}, nuo ${execDate}`,plan.carNumber,execDate);
    showT('Įvykdyta: '+plan.incomingDriverName+' → '+plan.carNumber);
  };

  // Computed
  const urgentCount = React.useMemo(()=>drivers.filter(d=>{
    if(d.status!=='Reise'||!d.plannedReturnDate) return false;
    const days=differenceInDays(parseISO(d.plannedReturnDate),new Date());
    return days<=7&&!plans.some(p=>p.status==='Suplanuota'&&p.leavingDriverId===d.id);
  }).length,[drivers,plans]);

  const potRepl = React.useMemo(()=>{
    if(!selTripId) return [];
    let lct='',lsp='';
    if(selTripId.startsWith('CAR:')){const car=cars.find(c=>c.number===selTripId.replace('CAR:',''));if(car)lct=car.registration;}
    else{const d=drivers.find(x=>x.id===selTripId);if(d){lct=d.companyType;lsp=d.specialization;}}
    return drivers.filter(d=>d.status==='Namuose').sort((a,b)=>{
      const da=a.readinessDate?parseISO(a.readinessDate).getTime():Infinity;
      const db=b.readinessDate?parseISO(b.readinessDate).getTime():Infinity;
      if(da!==db) return da-db;
      const sc=d=>{ const sc2=d.companyType===lct,ss=lsp?d.specialization===lsp:true,su=d.specialization==='Universalus'; return sc2?(ss?6:su?5:4):(ss?3:su?2:1); };
      return sc(b)-sc(a);
    });
  },[drivers,selTripId,cars]);

  const potTrips = React.useMemo(()=>{
    if(!selHomeId) return [];
    const target=parseISO(workDate);
    return drivers.filter(d=>d.status==='Reise'&&d.plannedReturnDate&&Math.abs(differenceInDays(parseISO(d.plannedReturnDate),target))<=14)
      .sort((a,b)=>(a.plannedReturnDate||'').localeCompare(b.plannedReturnDate||''));
  },[drivers,selHomeId,workDate]);

  const activePlans=plans.filter(p=>p.status==='Suplanuota');
  const reiseDrv=drivers.filter(d=>d.status==='Reise');
  const namuoseDrv=drivers.filter(d=>d.status==='Namuose').sort((a,b)=>(a.readinessDate||'').localeCompare(b.readinessDate||''));

  return (
    <div className="min-h-screen bg-stone-100 text-stone-900">

      {/* Header */}
      <header className="sticky top-0 z-20 shadow-lg" style={{background:'linear-gradient(135deg,#003087 0%,#004ab5 100%)'}}>
        <div className="max-w-screen-xl mx-auto px-4 h-16 flex items-center justify-between gap-4">
          {/* Logo */}
          <div className="flex items-center gap-3 shrink-0">
            <div className="flex items-center justify-center w-9 h-9 shrink-0">
              {/* Vestex mini logo mark */}
              <svg viewBox="0 0 40 32" width="36" height="29" fill="none">
                <path d="M6 6 L28 6 L34 16 L28 26 L6 26 L0 16 Z" fill="#003087"/>
                <path d="M8 6 L30 6 L36 16 L30 26 L8 26 L2 16 Z" fill="white" opacity="0.15"/>
                <circle cx="12" cy="20" r="6" fill="#CC1427"/>
                <circle cx="28" cy="20" r="5" fill="#CC1427"/>
                <rect x="8" y="8" width="24" height="10" rx="2" fill="white" opacity="0.9"/>
              </svg>
            </div>
            <div className="leading-none">
              <span className="text-white font-black text-lg tracking-tight">vest<span className="text-[#CC1427]">ex</span></span>
              <span className="block text-[10px] text-white/50 font-bold uppercase tracking-[3px] mt-0.5">transport · dispečeris</span>
            </div>
          </div>

          {/* Nav */}
          <nav className="flex items-center gap-0.5 overflow-x-auto py-1 px-1 bg-white/10 rounded-2xl">
            <TabBtn active={tab==='dashboard'}  onClick={()=>setTab('dashboard')}  label="Skydelis" />
            <TabBtn active={tab==='planning'}   onClick={()=>setTab('planning')}   label="Planavimas" badge={urgentCount} />
            <TabBtn active={tab==='drivers'}    onClick={()=>setTab('drivers')}    label="Vairuotojai" />
            <TabBtn active={tab==='cars'}       onClick={()=>setTab('cars')}       label="Auto" />
            <TabBtn active={tab==='history'}    onClick={()=>setTab('history')}    label="Istorija" />
            <TabBtn active={tab==='calendar'}   onClick={()=>setTab('calendar')}   label="Kalendorius" />
            <TabBtn active={tab==='grafikas'}   onClick={()=>setTab('grafikas')}   label="Grafikas" />
            <TabBtn active={tab==='trip'}      onClick={()=>setTab('trip')}      label="Kelionė" />
          </nav>

          {/* Actions */}
          <div className="flex items-center gap-2 shrink-0">
            <button onClick={()=>setAddCarOpen(true)} className="flex items-center gap-1.5 bg-white/15 border border-white/25 text-white px-3 py-2 rounded-xl text-xs font-semibold hover:bg-white/25 transition-all">+ Auto</button>
            <button onClick={()=>setAddDrvOpen(true)} className="flex items-center gap-1.5 bg-[#CC1427] text-white px-3 py-2 rounded-xl text-xs font-bold hover:bg-[#aa1020] transition-all shadow-md">+ Vairuotojas</button>
          </div>
        </div>
      </header>

      <main className="max-w-screen-xl mx-auto px-4 py-6 space-y-8">

        {/* ══ DASHBOARD ══ */}
        {tab==='dashboard'&&(
          <div className="space-y-8">
            {/* Stats */}
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
              <StatCard label="Reise"   value={reiseDrv.length}   sub={`iš ${drivers.length} viso`} color="bg-[#003087] border-[#003087] text-white"/>
              <StatCard label="Namuose" value={namuoseDrv.length} sub="laukia darbo"                 color="bg-emerald-600 border-emerald-700 text-white"/>
              <StatCard label="Planai"  value={activePlans.length} sub="suplanuota"                  color="bg-white border-[#003087]/20 text-[#003087]"/>
              <StatCard label="Skubu"   value={urgentCount}        sub="reikia keitimo ≤7d"          color={urgentCount>0?"bg-[#CC1427] border-[#CC1427] text-white":"bg-white border-slate-200 text-slate-400"}/>
            </div>

            {/* Urgent */}
            {urgentCount>0&&(
              <section>
                <h2 className="text-base font-bold mb-3 flex items-center gap-2 text-[#CC1427]">⚠️ Reikia keitimo (≤7 d.)</h2>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                  {reiseDrv.filter(d=>{
                    if(!d.plannedReturnDate) return false;
                    const days=differenceInDays(parseISO(d.plannedReturnDate),new Date());
                    return days<=7&&!plans.some(p=>p.status==='Suplanuota'&&p.leavingDriverId===d.id);
                  }).map(d=>(
                    <div key={d.id} className="bg-white border-l-4 border-l-[#CC1427] border border-[#CC1427]/20 rounded-2xl p-4 flex items-center justify-between gap-3 shadow-sm">
                      <div>
                        <p className="font-bold text-sm text-[#003087]">{d.name}</p>
                        <p className="text-xs text-[#CC1427] font-semibold">{d.currentCar} — grįžta: {d.plannedReturnDate}</p>
                        <p className="text-xs text-slate-400 mt-0.5">Liko {differenceInDays(parseISO(d.plannedReturnDate),new Date())} d.</p>
                      </div>
                      <button onClick={()=>{setSelTripId(d.id);setTab('planning');}} className="bg-[#CC1427] text-white px-3 py-1.5 rounded-xl text-xs font-bold hover:bg-[#aa1020] transition-colors whitespace-nowrap shadow-sm">Planuoti</button>
                    </div>
                  ))}
                </div>
              </section>
            )}

            {/* Plans */}
            <section>
              <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-4 gap-3">
                <h2 className="text-base font-bold flex items-center gap-2">🔄 Suplanuoti keitimai</h2>
                <MonthNav value={selMonth} onChange={setSelMonth}/>
              </div>
              {(()=>{
                const mp=activePlans.filter(p=>isSameMonth(parseISO(p.date),selMonth)&&cars.some(c=>c.number===p.carNumber));
                if(mp.length===0) return <EmptyState text="Šį mėnesį suplanuotų keitimų nėra"/>;
                const bw={};
                mp.forEach(p=>{const d=parseISO(p.date);const ws=startOfWeek(d);const k=formatDate(ws,'MM.dd');if(!bw[k]){bw[k]={start:ws,plans:[]};}bw[k].plans.push(p);});
                return (
                  <div className="space-y-8">
                    {Object.entries(bw).sort((a,b)=>a[1].start-b[1].start).map(([k,{start,plans:wp}])=>(
                      <div key={k}>
                        <div className="flex items-center gap-3 mb-4">
                          <span className="text-xs font-black uppercase tracking-widest text-[#003087] bg-[#003087]/10 px-3 py-1 rounded-full border border-[#003087]/20">
                            Savaitė {formatDate(start,'MM.dd')} – {formatDate(endOfWeek(start),'MM.dd')}
                          </span>
                          <div className="h-px flex-1 bg-[#003087]/10"/>
                        </div>
                        <div className="grid gap-3">
                          {wp.sort((a,b)=>a.date.localeCompare(b.date)).map(plan=>(
                            <div key={plan.id} className="bg-white border border-slate-200 rounded-2xl p-5 hover:shadow-lg hover:border-[#003087]/20 transition-all">
                              <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4">
                                <div className="flex flex-col items-center min-w-[64px]">
                                  <div className="w-12 h-12 rounded-2xl bg-[#003087] text-white flex flex-col items-center justify-center shadow-md">
                                    <span className="text-lg font-black leading-none">{formatDate(parseISO(plan.date),'dd')}</span>
                                    <span className="text-xs uppercase opacity-70">{formatDate(parseISO(plan.date),'EE')}</span>
                                  </div>
                                  <span className="mt-1.5 text-xs font-black text-[#CC1427] bg-[#CC1427]/10 px-2 py-0.5 rounded-full border border-[#CC1427]/20">{plan.carNumber}</span>
                                </div>
                                <div className="flex-1 flex items-center gap-4 bg-slate-50 rounded-xl p-4 border border-slate-100">
                                  <div className="flex-1 text-right">
                                    <p className="text-xs text-[#CC1427] font-bold uppercase mb-1">🏠 Namo</p>
                                    <p className="font-bold text-sm text-[#003087]">{plan.leavingDriverName}</p>
                                  </div>
                                  <div className="w-8 h-8 rounded-xl bg-white border border-[#003087]/20 flex items-center justify-center shrink-0 text-[#003087]">⇄</div>
                                  <div className="flex-1">
                                    <p className="text-xs text-emerald-600 font-bold uppercase mb-1">🚚 Į reisą</p>
                                    <p className="font-bold text-sm text-[#003087]">{plan.incomingDriverName}</p>
                                  </div>
                                </div>
                                <div className="flex sm:flex-col gap-2">
                                  <button onClick={()=>{setConfirmData({carNumber:plan.carNumber,leavingId:plan.leavingDriverId,incomingId:plan.incomingDriverId,date:plan.date,driverName:plan.incomingDriverName,planId:plan.id,isExecution:true});if(plan.newPlannedReturnDate)setNewReturn(plan.newPlannedReturnDate);}} className="p-2.5 bg-emerald-50 text-emerald-600 hover:bg-emerald-600 hover:text-white rounded-xl transition-all text-sm" title="Įvykdyta">✓</button>
                                  <button onClick={()=>delPlan(plan.id)} className="p-2.5 bg-[#CC1427]/10 text-[#CC1427] hover:bg-[#CC1427] hover:text-white rounded-xl transition-all text-sm" title="Ištrinti">✕</button>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                );
              })()}
            </section>

            {/* Drivers at home — grouped by company then specialization */}
            <section>
              <div className="flex items-center justify-between mb-4">
                <h2 className="text-base font-bold flex items-center gap-2">🏠 Vairuotojai namuose
                  <span className="text-xs font-normal text-slate-400 ml-1">({namuoseDrv.length})</span>
                </h2>
              </div>
              {namuoseDrv.length===0 ? <EmptyState text="Visi vairuotojai reise"/> : (
                <div className="space-y-6">
                  {['LT','PL'].map(ct => {
                    const ctDrivers = namuoseDrv.filter(d => d.companyType === ct);
                    if (ctDrivers.length === 0) return null;
                    // colors per company
                    const isLT = ct === 'LT';
                    const headerBg = isLT ? '#003087' : '#1a5c9e';
                    const borderColor = isLT ? '#003087' : '#1a5c9e';
                    return (
                      <div key={ct} className="rounded-2xl border overflow-hidden shadow-sm" style={{borderColor}}>
                        {/* Company header */}
                        <div className="flex items-center gap-3 px-4 py-2.5 text-white" style={{background: headerBg}}>
                          <span className="text-xs font-black uppercase tracking-widest">🚛 {ct} parkas</span>
                          <span className="text-xs opacity-60 font-bold">— {ctDrivers.length} vairuotojas</span>
                        </div>
                        {/* Specialization groups */}
                        <div className="bg-white divide-y divide-slate-100">
                          {['Tentas','Refas','Universalus'].map(sp => {
                            const spDrivers = ctDrivers.filter(d => d.specialization === sp);
                            if (spDrivers.length === 0) return null;
                            const spIcon = sp==='Tentas'?'🔵':sp==='Refas'?'❄️':'⭐';
                            return (
                              <div key={sp} className="p-4">
                                {/* Spec sub-header */}
                                <div className="flex items-center gap-2 mb-3">
                                  <span className="text-xs">{spIcon}</span>
                                  <span className="text-xs font-black uppercase tracking-wider text-slate-500">{sp}</span>
                                  <span className="text-xs text-slate-300 font-bold">({spDrivers.length})</span>
                                  <div className="h-px flex-1 bg-slate-100"/>
                                </div>
                                {/* Driver cards */}
                                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                                  {spDrivers.map(d => {
                                    const daysHome = d.lastTripEndDate ? differenceInDays(new Date(), parseISO(d.lastTripEndDate)) : null;
                                    const isReady = d.readinessDate && d.readinessDate <= todayStr();
                                    const hasActivePlan = plans.some(p => p.status==='Suplanuota' && p.incomingDriverId===d.id);
                                    return (
                                      <div key={d.id} className={cn(
                                        "bg-slate-50 rounded-xl border p-3.5 group hover:shadow-md transition-all relative",
                                        hasActivePlan ? "border-[#003087]/30 bg-[#003087]/5" : isReady ? "border-emerald-300 bg-emerald-50/50" : "border-slate-200 hover:border-[#003087]/30"
                                      )}>
                                        {/* Ready indicator */}
                                        {isReady && !hasActivePlan && (
                                          <span className="absolute top-2 right-2 w-2 h-2 rounded-full bg-emerald-400 animate-pulse" title="Pasiruošęs šiandien"/>
                                        )}
                                        {hasActivePlan && (
                                          <span className="absolute top-2 right-2 text-xs">📋</span>
                                        )}
                                        <div className="flex items-center gap-2.5 mb-2.5">
                                          <div className="w-8 h-8 rounded-lg flex items-center justify-center font-black text-sm text-white shrink-0" style={{background: headerBg}}>
                                            {d.name[0]}
                                          </div>
                                          <div className="min-w-0">
                                            <p className="font-bold text-xs truncate text-[#003087]">{d.name}</p>
                                            <Badge v={d.homeStatus==='Tvarko dokumentus'?'amber':'green'}>{d.homeStatus}</Badge>
                                          </div>
                                        </div>
                                        <div className="space-y-1 text-xs">
                                          <div className="flex justify-between items-center">
                                            <span className="text-slate-400 font-semibold">Gali nuo</span>
                                            <span className={cn("font-black", isReady ? "text-emerald-600" : "text-[#CC1427]")}>{d.readinessDate||'?'}</span>
                                          </div>
                                          {daysHome !== null && (
                                            <div className="flex justify-between items-center">
                                              <span className="text-slate-400 font-semibold">Namuose</span>
                                              <span className="font-bold text-slate-600">{daysHome} d.</span>
                                            </div>
                                          )}
                                        </div>
                                        <button
                                          onClick={()=>{setSelDrvTrip(d);setTripOpen(true);}}
                                          className="w-full mt-2.5 py-1.5 text-white text-xs font-bold uppercase rounded-lg opacity-0 group-hover:opacity-100 transition-all shadow-sm"
                                          style={{background:'#CC1427'}}
                                        >Į reisą →</button>
                                      </div>
                                    );
                                  })}
                                </div>
                              </div>
                            );
                          })}
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </section>
          </div>
        )}

        {/* ══ PLANNING ══ */}
        {tab==='planning'&&(
          <div className="space-y-6">
            <h2 className="text-xl font-bold">Pakeitimų planavimas</h2>
            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
              {/* Left */}
              <div className="bg-white rounded-2xl border border-slate-200 p-6 space-y-5 shadow-sm">
                <h3 className="font-bold flex items-center gap-2 border-b border-[#CC1427]/20 pb-4 text-[#003087]"><span className="w-2 h-5 bg-[#CC1427] rounded-full inline-block mr-1"/>Ką pakeisti?</h3>
                <Field label="Automobilis / vairuotojas reise">
                  <select className={sc} value={selTripId} onChange={e=>setSelTripId(e.target.value)}>
                    <option value="">Pasirinkite...</option>
                    <optgroup label="Reise">
                      {drivers.filter(d=>d.status==='Reise').sort((a,b)=>(a.plannedReturnDate||'').localeCompare(b.plannedReturnDate||'')).map(d=>(
                        <option key={d.id} value={d.id}>{d.currentCar} • {d.name} — grįžta: {d.plannedReturnDate||'?'}</option>
                      ))}
                    </optgroup>
                    <optgroup label="Laisvi automobiliai">
                      {cars.filter(c=>!drivers.some(d=>d.currentCar===c.number)).map(c=>(
                        <option key={c.id} value={`CAR:${c.number}`}>{c.number} ({c.registration} • {c.type}) — aktyvus nuo: {c.activeFrom}</option>
                      ))}
                    </optgroup>
                  </select>
                </Field>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Keitimo data"><input type="date" className={ic} value={replDate} onChange={e=>setReplDate(e.target.value)}/></Field>
                  <Field label="Dirbs iki"><input type="date" className={ic} value={newReturn} onChange={e=>setNewReturn(e.target.value)}/></Field>
                </div>
                <div className="space-y-2">
                  <p className="text-xs font-bold uppercase tracking-wider text-[#003087]/50">Rekomenduojami ({potRepl.length})</p>
                  <div className="space-y-2 max-h-80 overflow-y-auto pr-1">
                    {potRepl.length===0&&<p className="text-xs text-slate-400 italic py-4 text-center">Nėra laisvų vairuotojų</p>}
                    {potRepl.map(d=>{
                      const isP=plans.some(p=>p.incomingDriverId===d.id&&p.status==='Suplanuota');
                      return (
                        <div key={d.id} className={cn("flex items-center justify-between p-3 rounded-xl border",isP?"bg-emerald-50 border-emerald-200":"bg-slate-50 border-slate-100 hover:border-[#003087]/30 hover:bg-[#003087]/5")}>
                          <div>
                            <p className="text-sm font-semibold text-[#003087]">{d.name}</p>
                            <div className="flex gap-1.5 mt-0.5 flex-wrap">
                              <Badge v="blue">{d.specialization}</Badge><Badge>{d.companyType}</Badge>
                              <span className="text-xs text-slate-400">Nuo: {d.readinessDate||'?'}</span>
                            </div>
                          </div>
                          {isP?<Badge v="green">Suplanuota</Badge>:(
                            <button onClick={()=>{
                              const leaving=selTripId.startsWith('CAR:')?null:drivers.find(x=>x.id===selTripId);
                              const carNum=selTripId.startsWith('CAR:')?selTripId.replace('CAR:',''):leaving?.currentCar||'';
                              setConfirmData({carNumber:carNum,leavingId:leaving?.id||null,incomingId:d.id,date:replDate,driverName:d.name});
                            }} className="bg-[#CC1427] text-white text-xs font-bold px-3 py-1.5 rounded-xl hover:bg-[#aa1020] transition-colors shadow-sm">Planuoti</button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
              {/* Right */}
              <div className="bg-white rounded-2xl border border-slate-200 p-6 space-y-5 shadow-sm">
                <h3 className="font-bold flex items-center gap-2 border-b border-emerald-200 pb-4 text-[#003087]"><span className="w-2 h-5 bg-emerald-500 rounded-full inline-block mr-1"/>Kam duoti darbą?</h3>
                <Field label="Vairuotojas namuose">
                  <select className={sc} value={selHomeId} onChange={e=>setSelHomeId(e.target.value)}>
                    <option value="">Pasirinkite...</option>
                    {drivers.filter(d=>d.status==='Namuose').sort((a,b)=>(a.readinessDate||'').localeCompare(b.readinessDate||'')).map(d=>(
                      <option key={d.id} value={d.id}>{d.name} ({d.companyType} • {d.specialization}) — nuo: {d.readinessDate||'?'}</option>
                    ))}
                  </select>
                </Field>
                <div className="grid grid-cols-2 gap-3">
                  <Field label="Darbo data"><input type="date" className={ic} value={workDate} onChange={e=>setWorkDate(e.target.value)}/></Field>
                  <Field label="Dirbs iki"><input type="date" className={ic} value={newReturn} onChange={e=>setNewReturn(e.target.value)}/></Field>
                </div>
                <div className="space-y-2">
                  <p className="text-xs font-bold uppercase tracking-wider text-[#003087]/50">Galimi automobiliai ({potTrips.length})</p>
                  <div className="space-y-2 max-h-80 overflow-y-auto pr-1">
                    {potTrips.length===0&&<p className="text-xs text-slate-400 italic py-4 text-center">Nėra grįžtančių vairuotojų</p>}
                    {potTrips.map(d=>{
                      const isP=plans.some(p=>p.carNumber===d.currentCar&&p.date===workDate&&p.status==='Suplanuota');
                      const late=d.plannedReturnDate&&isBefore(parseISO(d.plannedReturnDate),new Date());
                      return (
                        <div key={d.id} className={cn("flex items-center justify-between p-3 rounded-xl border",isP?"bg-emerald-50 border-emerald-200":"bg-slate-50 border-slate-100 hover:border-[#003087]/30")}>
                          <div>
                            <p className="text-sm font-semibold text-[#003087]">{d.currentCar} — {d.name}</p>
                            <div className="flex gap-1.5 mt-0.5">
                              <Badge v={late?'red':'blue'}>{late?'Vėluoja':'Nuo: '+d.plannedReturnDate}</Badge>
                            </div>
                          </div>
                          {isP?<Badge v="green">Suplanuota</Badge>:(
                            <button onClick={()=>{
                              if(!selHomeId){showT('Pasirinkite vairuotoją','error');return;}
                              const inc=drivers.find(x=>x.id===selHomeId);
                              setConfirmData({carNumber:d.currentCar,leavingId:d.id,incomingId:selHomeId,date:workDate,driverName:inc?.name||''});
                            }} className="bg-[#CC1427] text-white text-xs font-bold px-3 py-1.5 rounded-xl hover:bg-[#aa1020] transition-colors shadow-sm">Planuoti</button>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          </div>
        )}

        {/* ══ DRIVERS ══ */}
        {tab==='drivers'&&(
          <div className="space-y-4">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
              <h2 className="text-xl font-bold">Vairuotojai ({drivers.length})</h2>
              <div className="flex flex-wrap gap-2">

                        <td className="px-4 py-3"><div className="font-semibold text-[#003087]">{d.name}</div><div className="text-xs text-slate-400 font-mono">{d.phone}</div></td>
                        <td className="px-4 py-3"><div className="flex gap-1.5 flex-wrap"><Badge>{d.companyType}</Badge><Badge v="blue">{d.specialization}</Badge></div></td>
                        <td className="px-4 py-3"><Badge v={d.status==='Reise'?'blue':'green'}>{d.status}</Badge>{isLate&&<span className="ml-1"><Badge v="red">Vėluoja</Badge></span>}</td>

                            ):(
                              <button onClick={()=>{setSelDrvTrip(d);setTripOpen(true);}} className="px-2.5 py-1 bg-[#CC1427] text-white text-xs font-bold rounded-lg hover:bg-[#aa1020] transition-colors">Į reisą</button>

                            <button onClick={()=>delDriver(d.id)} className="p-1.5 bg-[#CC1427]/10 text-[#CC1427] hover:bg-[#CC1427] hover:text-white rounded-lg transition-all text-xs">✕</button>
                          </div>

                      </tr>

                  })}
                </tbody>
              </table>
            </div>

        {/* ══ CARS ══ */}
        {tab==='cars'&&(
          <div className="space-y-4">
            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
              <h2 className="text-xl font-bold">Automobilių parkas ({cars.length})</h2>
              <div className="flex gap-2 flex-wrap">
                <select className={cn(sc,'w-auto')} value={carF.reg} onChange={e=>setCarF(p=>({...p,reg:e.target.value}))}>
                  <option value="">Visos registracijos</option><option value="LT">LT</option><option value="PL">PL</option>
                </select>
                <select className={cn(sc,'w-auto')} value={carF.type} onChange={e=>setCarF(p=>({...p,type:e.target.value}))}>
                  <option value="">Visi tipai</option><option value="Tentas">Tentas</option><option value="Refas">Refas</option>
                </select>
                <input placeholder="Paieška..." className={cn(ic,'w-32')} value={carF.q} onChange={e=>setCarF(p=>({...p,q:e.target.value}))}/>
              </div>
            </div>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
              {cars.filter(c=>{
                const mr=!carF.reg||c.registration===carF.reg;
                const mt=!carF.type||c.type===carF.type;
                const ms=!carF.q||c.number.toLowerCase().includes(carF.q.toLowerCase());
                return mr&&mt&&ms;
              }).map(car=>{
                const driver=drivers.find(d=>d.currentCar===car.number);
                const plan=plans.find(p=>p.status==='Suplanuota'&&p.carNumber===car.number);
                return (
                  <div key={car.id} className="bg-white rounded-2xl border border-stone-200 p-5 flex flex-col gap-4 hover:shadow-md transition-shadow group">
                    <div className="flex items-start justify-between">
                      <div>
                        <p className="font-mono font-black text-xl tracking-tight">{car.number}</p>
                        <div className="flex gap-1.5 mt-1 flex-wrap"><Badge v="blue">{car.type}</Badge><Badge>{car.registration}</Badge><Badge v={car.status==='Aktyvus'?'green':'red'}>{car.status}</Badge></div>
                      </div>
                      <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onClick={()=>{setSelCarEdit(car);setEditCarOpen(true);}} className="p-1.5 text-[#003087] hover:bg-[#003087]/10 rounded-lg text-xs">✎</button>
                        <button onClick={()=>delCar(car.id)} className="p-1.5 text-[#CC1427] hover:bg-[#CC1427]/10 rounded-lg text-xs">✕</button>
                      </div>
                    </div>
                    <div className="flex items-center gap-2 text-sm border-t border-slate-100 pt-3">
                      <div className="w-6 h-6 rounded-full bg-[#003087]/10 text-[#003087] flex items-center justify-center text-xs shrink-0 font-bold">{driver?driver.name[0]:'?'}</div>
                      {driver?<p className="font-semibold text-[#003087]">{driver.name}</p>:<p className="text-slate-400 italic text-xs">Nepriskirtas</p>}
                    </div>
                    {plan&&(
                      <div className="bg-[#003087]/5 border border-[#003087]/20 rounded-xl p-3">
                        <p className="text-xs font-black text-[#003087] uppercase mb-1">⇄ Suplanuotas keitimas</p>
                        <p className="text-xs font-semibold text-[#CC1427]">{plan.incomingDriverName} → {plan.date}</p>
                      </div>
                    )}
                    {!driver&&(
                      <button onClick={()=>{setSelCarAssign(car.number);setTripOpen(true);}} className="w-full bg-[#CC1427] text-white py-2 rounded-xl text-xs font-bold hover:bg-[#aa1020] transition-colors shadow-sm">Priskirti vairuotoją</button>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ══ HISTORY ══ full timeline, grouped month → week ══ */}
        {tab==='history'&&(()=>{
          const isUpcoming = histMode==='upcoming';
          const filteredPlans = plans
            .filter(p=>isUpcoming?p.status==='Suplanuota':p.status==='Atlikta')
            .sort((a,b)=>isUpcoming?a.date.localeCompare(b.date):b.date.localeCompare(a.date));

          // Group: year → month (key=yyyy-MM) → week (key=Sv.N)
          const grouped = {};
          filteredPlans.forEach(p=>{
            const d=parseISO(p.date);
            const yearKey=formatDate(d,'yyyy');
            const monthKey=formatDate(d,'yyyy-MM');
            const wStart=startOfWeek(d);
            const wEnd=endOfWeek(d);
            const weekKey=`${formatDate(wStart,'MM.dd')}–${formatDate(wEnd,'MM.dd')}`;
            if(!grouped[yearKey]) grouped[yearKey]={};
            if(!grouped[yearKey][monthKey]) grouped[yearKey][monthKey]={label:formatDate(d,'MMMM yyyy'),weeks:{}};
            if(!grouped[yearKey][monthKey].weeks[weekKey]) grouped[yearKey][monthKey].weeks[weekKey]={label:weekKey,plans:[]};
            grouped[yearKey][monthKey].weeks[weekKey].plans.push(p);
          });

          const yearKeys=Object.keys(grouped).sort((a,b)=>isUpcoming?a-b:b-a);

          return (
            <div className="space-y-5">
              {/* Toolbar */}
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div>
                  <h2 className="text-xl font-bold text-[#003087]">Pakeitimų istorija</h2>
                  <p className="text-xs text-slate-400 mt-0.5">Visi keitimai — sugrupuoti pagal mėnesį ir savaitę</p>
                </div>
                <div className="flex bg-[#003087]/10 p-1 rounded-xl w-fit">
                  {['upcoming','past'].map(m=>(
                    <button key={m} onClick={()=>setHistMode(m)} className={cn("px-5 py-2 rounded-lg text-xs font-bold transition-all",histMode===m?"bg-[#003087] text-white shadow":"text-[#003087]/50 hover:text-[#003087]")}>
                      {m==='upcoming'?`📋 Būsimi (${plans.filter(p=>p.status==='Suplanuota').length})`:`✅ Atlikti (${plans.filter(p=>p.status==='Atlikta').length})`}
                    </button>
                  ))}
                </div>
              </div>

              {yearKeys.length===0&&<EmptyState text="Planų nerasta"/>}

              {/* Year → Month → Week → Plans */}
              {yearKeys.map(yearKey=>(
                <div key={yearKey} className="space-y-4">
                  {/* Year divider */}
                  <div className="flex items-center gap-3">
                    <div className="flex items-center gap-2 px-4 py-1.5 rounded-full text-white text-sm font-black" style={{background:'#003087'}}>
                      📅 {yearKey}
                    </div>
                    <div className="h-px flex-1 bg-[#003087]/10"/>
                    <span className="text-xs text-slate-400 font-bold">
                      {Object.values(grouped[yearKey]).reduce((s,m)=>s+Object.values(m.weeks).reduce((ws,w)=>ws+w.plans.length,0),0)} keitimų
                    </span>
                  </div>

                  {Object.entries(grouped[yearKey]).map(([monthKey,monthData])=>(
                    <div key={monthKey} className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                      {/* Month header */}
                      <div className="px-5 py-3 flex items-center gap-3 border-b border-[#003087]/10" style={{background:'linear-gradient(90deg,#e8eef7 0%,#f8fafc 100%)'}}>
                        <span className="text-sm font-black text-[#003087] uppercase tracking-wide">{monthData.label}</span>
                        <span className="text-xs text-slate-400 font-bold ml-auto">
                          {Object.values(monthData.weeks).reduce((s,w)=>s+w.plans.length,0)} keitimų
                        </span>
                      </div>

                      {/* Weeks */}
                      <div className="divide-y divide-slate-100">
                        {Object.entries(monthData.weeks).map(([weekKey,weekData])=>(
                          <div key={weekKey} className="px-5 py-4">
                            {/* Week label */}
                            <div className="flex items-center gap-2 mb-3">
                              <span className="text-xs font-black uppercase tracking-widest text-slate-400 bg-slate-100 px-2.5 py-1 rounded-full">
                                Savaitė {weekData.label}
                              </span>
                              <span className="text-xs text-slate-300">({weekData.plans.length})</span>
                            </div>

                            {/* Plan cards in a responsive grid */}
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-3">
                              {weekData.plans.sort((a,b)=>a.date.localeCompare(b.date)).map(plan=>{
                                const car=cars.find(c=>c.number===plan.carNumber);
                                const isUpcomingPlan=plan.status==='Suplanuota';
                                return (
                                  <div key={plan.id} className={cn(
                                    "rounded-xl border p-3.5 relative group transition-all hover:shadow-md",
                                    isUpcomingPlan?"bg-[#003087]/5 border-[#003087]/20":"bg-emerald-50/50 border-emerald-200/60"
                                  )}>
                                    {/* Date + car badges */}
                                    <div className="flex items-center justify-between mb-2.5 gap-2">
                                      <span className="font-mono text-xs font-black text-[#003087]">{plan.date}</span>
                                      <div className="flex items-center gap-1.5">
                                        <span className="font-mono text-xs font-black bg-[#003087] text-white px-1.5 py-0.5 rounded">{plan.carNumber}</span>
                                        {car&&<Badge v="blue">{car.type}</Badge>}
                                      </div>
                                    </div>

                                    {/* Swap row */}
                                    <div className="flex items-center gap-2">
                                      <div className="flex-1 min-w-0">
                                        <p className="text-xs text-[#CC1427] font-bold uppercase leading-none mb-0.5">Namo</p>
                                        <p className="text-xs font-semibold truncate text-slate-700">{plan.leavingDriverName}</p>
                                      </div>
                                      <span className="text-slate-300 font-bold shrink-0">⇄</span>
                                      <div className="flex-1 min-w-0 text-right">
                                        <p className="text-xs text-emerald-600 font-bold uppercase leading-none mb-0.5">Į reisą</p>
                                        <p className="text-xs font-semibold truncate text-[#003087]">{plan.incomingDriverName}</p>
                                      </div>
                                    </div>

                                    {/* Actions for upcoming */}
                                    {isUpcomingPlan&&(
                                      <div className="flex gap-1.5 mt-2.5 opacity-0 group-hover:opacity-100 transition-opacity">
                                        <button onClick={()=>{setConfirmData({carNumber:plan.carNumber,leavingId:plan.leavingDriverId,incomingId:plan.incomingDriverId,date:plan.date,driverName:plan.incomingDriverName,planId:plan.id,isExecution:true});if(plan.newPlannedReturnDate)setNewReturn(plan.newPlannedReturnDate);}} className="flex-1 py-1 bg-emerald-500 text-white text-xs font-bold rounded-lg hover:bg-emerald-600 transition-colors">✓ Įvykdyta</button>
                                        <button onClick={()=>delPlan(plan.id)} className="px-2 py-1 bg-[#CC1427]/10 text-[#CC1427] text-xs font-bold rounded-lg hover:bg-[#CC1427] hover:text-white transition-colors">✕</button>
                                      </div>
                                    )}
                                    {!isUpcomingPlan&&(
                                      <div className="mt-2 flex justify-end">
                                        <span className="text-xs text-emerald-600 font-black uppercase">✓ Atlikta</span>
                                      </div>
                                    )}
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          );
        })()}

        {/* ══ CALENDAR ══ */}
        {tab==='calendar'&&(
          <div className="space-y-4">
            <div className="flex items-center justify-between">
              <h2 className="text-xl font-bold">Keitimų kalendorius</h2>
              <MonthNav value={selMonth} onChange={setSelMonth}/>
            </div>
            <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
              <div className="grid grid-cols-7 border-b border-[#003087]/20" style={{background:'linear-gradient(90deg,#003087 0%,#004ab5 100%)'}}>
                {['Pr','An','Tr','Kt','Pn','Še','Se'].map(d=><div key={d} className="p-3 text-center text-xs font-black uppercase tracking-widest text-white">{d}</div>)}
              </div>
              <div className="grid grid-cols-7">
                {(()=>{
                  const ms=startOfMonth(selMonth);
                  const me=endOfMonth(ms);
                  const days=eachDayOfInterval(startOfWeek(ms),endOfWeek(me));
                  return days.map((day,i)=>{
                    const ds=formatDate(day,'yyyy-MM-dd');
                    const dp=plans.filter(p=>p.date===ds);
                    const curr=isSameMonth(day,selMonth);
                    const tod=isSameDay(day,new Date());
                    return (
                      <div key={i} onClick={()=>dp.length>0&&setSelDay(ds)} className={cn("min-h-24 p-2 border-r border-b border-slate-100 transition-colors",!curr&&"bg-slate-50 opacity-40",tod&&"bg-[#003087]/5",dp.length>0&&"cursor-pointer hover:bg-[#003087]/5")}>
                        <span className={cn("text-xs font-bold w-6 h-6 flex items-center justify-center rounded-full",tod?"bg-[#CC1427] text-white":"text-slate-400")}>{formatDate(day,'d')}</span>
                        <div className="mt-1 space-y-1">
                          {dp.slice(0,3).map(p=>(
                            <div key={p.id} className={cn("text-xs px-1.5 py-0.5 rounded font-bold truncate",p.status==='Suplanuota'?"bg-[#003087]/10 text-[#003087]":"bg-emerald-100 text-emerald-700")}>
                              {p.carNumber} • {p.incomingDriverName}
                            </div>
                          ))}
                          {dp.length>3&&<div className="text-xs text-slate-400 font-bold">+{dp.length-3}</div>}
                        </div>
                      </div>
                    );
                  });
                })()}
              </div>
            </div>
          </div>
        )}

        {/* ══ GRAFIKAS ══ full-year view ══ */}
        {tab==='grafikas'&&(()=>{
          const yearStart = new Date(grafYear,0,1);
          const yearEnd   = new Date(grafYear,11,31);
          const isLeap    = grafYear%4===0&&(grafYear%100!==0||grafYear%400===0);
          const totalDays = isLeap?366:365;
          const dayOffset = d => differenceInDays(d,yearStart);
          const pct       = d => `${(dayOffset(d)/totalDays)*100}%`;
          const pctW      = days => `${(days/totalDays)*100}%`;
          const months    = Array.from({length:12},(_,i)=>new Date(grafYear,i,1));
          const todayOff  = dayOffset(new Date());
          const showToday = grafYear===new Date().getFullYear();

          // legend colors
          const BAR_COLORS = [
            '#003087','#CC1427','#0066cc','#e05c00','#006633','#7c3aed',
            '#0891b2','#be123c','#15803d','#a16207','#1d4ed8','#9d174d'
          ];
          // assign stable color per driver name (no hook — computed inline)
          const driverColorMap = {};
          let _ci=0;
          [...carAssignments,...plans].forEach(a=>{
            const name=a.driverName||a.incomingDriverName;
            if(name&&!driverColorMap[name]) driverColorMap[name]=BAR_COLORS[_ci++%BAR_COLORS.length];
          });

          return (
            <div className="space-y-4">
              {/* Header */}
              <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
                <div>
                  <h2 className="text-xl font-bold text-[#003087]">Automobilių užimtumo grafikas</h2>
                  <p className="text-xs text-slate-400 mt-0.5">Pilna metų istorija kiekvienai mašinai</p>
                </div>
                <div className="flex items-center gap-2">
                  {/* Legend */}
                  <div className="flex items-center gap-3 text-xs text-slate-500 mr-4">
                    <div className="flex items-center gap-1.5"><div className="w-6 h-3 rounded" style={{background:'#003087'}}/><span>Reisas</span></div>
                    <div className="flex items-center gap-1.5"><div className="w-6 h-3 rounded border-2 border-dashed" style={{borderColor:'#CC1427',background:'rgba(204,20,39,0.15)'}}/><span>Planas</span></div>
                  </div>
                  {/* Year nav */}
                  <div className="flex items-center gap-1 bg-white border border-slate-200 rounded-xl p-1 shadow-sm">
                    <button onClick={()=>setGrafYear(y=>y-1)} className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-400 transition-colors">◀</button>
                    <span className="px-4 text-sm font-black text-[#003087] min-w-[60px] text-center">{grafYear}</span>
                    <button onClick={()=>setGrafYear(y=>y+1)} className="p-1.5 hover:bg-slate-100 rounded-lg text-slate-400 transition-colors">▶</button>
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
                <div className="overflow-x-auto">
                  <div style={{minWidth:'1100px'}}>

                    {/* Month header row */}
                    <div className="flex border-b border-[#003087]/20 text-white" style={{background:'linear-gradient(90deg,#003087 0%,#004ab5 100%)'}}>
                      <div className="w-44 shrink-0 px-4 py-3 text-xs font-black uppercase tracking-wider border-r border-white/10">Auto</div>
                      <div className="flex-1 relative h-10">
                        {months.map((m,i)=>{
                          const daysInM = getDaysInMonth(m);
                          const left = pct(m);
                          const width = pctW(daysInM);
                          const isCurrentMonth = showToday && isSameMonth(m,new Date());
                          return (
                            <div key={i} className="absolute top-0 bottom-0 flex items-center justify-center border-r border-white/10 text-xs font-black uppercase tracking-wide"
                              style={{left, width, background: isCurrentMonth?'rgba(255,255,255,0.15)':'transparent'}}>
                              {formatDate(m,'MMM')}
                            </div>
                          );
                        })}
                        {/* Today line in header */}
                        {showToday&&todayOff>=0&&todayOff<totalDays&&(
                          <div className="absolute top-0 bottom-0 w-0.5 bg-[#CC1427] z-10" style={{left:`calc(${pct(new Date())} + 1px)`}}/>
                        )}
                      </div>
                    </div>

                    {/* Car rows */}
                    <div className="divide-y divide-slate-100">
                      {cars.map(car=>{
                        // Build bars
                        const bars=[];

                        // Historical assignments
                        carAssignments.filter(a=>a.carNumber===car.number).forEach(a=>{
                          const s=parseISO(a.startDate);
                          const rawEnd = a.endDate ? parseISO(a.endDate) : (()=>{
                            const d=drivers.find(x=>x.id===a.driverId);
                            return d?.plannedReturnDate ? parseISO(d.plannedReturnDate) : addDays(new Date(),90);
                          })();
                          if(isAfter(s,yearEnd)||isBefore(rawEnd,yearStart)) return;
                          const ds=isBefore(s,yearStart)?yearStart:s;
                          const de=isAfter(rawEnd,yearEnd)?yearEnd:rawEnd;
                          const si=dayOffset(ds); const ei=dayOffset(de);
                          if(ei>si) bars.push({si,ei,type:'active',label:a.driverName,color:driverColorMap[a.driverName]||'#003087'});
                        });

                        // Planned future
                        plans.filter(p=>p.status==='Suplanuota'&&p.carNumber===car.number).forEach(p=>{
                          const s=parseISO(p.date);
                          const e=p.newPlannedReturnDate?parseISO(p.newPlannedReturnDate):addDays(s,42);
                          if(isAfter(s,yearEnd)||isBefore(e,yearStart)) return;
                          const ds=isBefore(s,yearStart)?yearStart:s;
                          const de=isAfter(e,yearEnd)?yearEnd:e;
                          const si=dayOffset(ds); const ei=dayOffset(de);
                          if(ei>si) bars.push({si,ei,type:'planned',label:p.incomingDriverName,color:driverColorMap[p.incomingDriverName]||'#CC1427'});
                        });

                        return (
                          <div key={car.id} className="flex group hover:bg-[#003087]/5 transition-colors" style={{height:'52px'}}>
                            {/* Car label */}
                            <div className="w-44 shrink-0 px-4 flex items-center gap-2 border-r border-slate-100">
                              <div className="min-w-0">
