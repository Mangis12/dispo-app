        {pendingTaskStop&&(
          <div className="fixed inset-0 bg-[#003087]/60 backdrop-blur-sm z-[70] flex items-center justify-center p-4 fade-in"
            onClick={e=>e.target===e.currentTarget&&setPendingTaskStop(null)}>
            <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl overflow-hidden border border-amber-200">
              <div className="px-5 py-4 flex items-center gap-3 bg-amber-500">
                <span className="text-2xl">📦</span>
                <div>
                  <p className="text-white font-black text-sm">Nauja užduotis</p>
                  <p className="text-white/70 text-xs">{pendingTaskStop.city}</p>
                </div>
                <button onClick={()=>setPendingTaskStop(null)} className="ml-auto p-1.5 hover:bg-white/20 rounded-lg text-white/70">✕</button>
              </div>
              <div className="p-5 space-y-4">
                <p className="text-xs text-slate-500">
                  📍 <span className="font-mono">{pendingTaskStop.lat.toFixed(4)}, {pendingTaskStop.lng.toFixed(4)}</span>
                </p>
                <Field label="Užduoties aprašymas">
                  <textarea
                    autoFocus
                    className={cn(ic,'resize-none')}
                    rows={3}
                    placeholder="pvz. Pasiimti dokumentus iš ekspedicijos, priduoti raktus, paimti krovinį..."
                    value={pendingTaskDesc}
                    onChange={e=>setPendingTaskDesc(e.target.value)}
                    onKeyDown={e=>{
                      if(e.key==='Enter'&&!e.shiftKey){
                        e.preventDefault();
                        const vid=activeVeh.id;
                        setTripFleet(p=>p.map(v=>v.id===vid?{...v,stops:[...v.stops,{
                          id:stopIdx.current++,
                          lat:pendingTaskStop.lat,lng:pendingTaskStop.lng,
                          city:pendingTaskStop.city,
                          type:'task',driverId:'',planId:'',addWork:'',
                          taskDesc:pendingTaskDesc
                        }]}:v));
                        setPendingTaskStop(null);
                      }
                    }}
                  />
                </Field>
                <p className="text-xs text-slate-400">Enter — išsaugoti · Shift+Enter — nauja eilutė</p>
              </div>
              <div className="px-5 pb-5 flex gap-3">
                <button onClick={()=>setPendingTaskStop(null)}
                  className="flex-1 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50">
                  Atšaukti
                </button>
                <button onClick={()=>{
                  const vid=activeVeh.id;
                  setTripFleet(p=>p.map(v=>v.id===vid?{...v,stops:[...v.stops,{
                    id:stopIdx.current++,
                    lat:pendingTaskStop.lat,lng:pendingTaskStop.lng,
                    city:pendingTaskStop.city,
                    type:'task',driverId:'',planId:'',addWork:'',
                    taskDesc:pendingTaskDesc
                  }]}:v));
                  setPendingTaskStop(null);
                }} className="flex-1 py-2.5 rounded-xl text-sm font-bold text-white bg-amber-500 hover:bg-amber-600 transition-colors">
                  📦 Pridėti užduotį
                </button>
              </div>
            </div>
          </div>
        )}

        {/* Reset */}
        <div className="text-center pt-4">
          <button onClick={()=>{ if(confirm('Atstatyti sistemą?')){setDrivers(INIT_DRIVERS);setCars(INIT_CARS);setHistory([]);setPlans([]);setCarAssignments([]);localStorage.clear();showT('Sistema atstatyta');}}} className="text-xs font-bold text-[#003087]/20 hover:text-[#003087]/50 transition-colors uppercase tracking-widest">
            Sistemos atstatymas
          </button>
        </div>
      </main>

      {/* ══ MODALS ══ */}

      {addDrvOpen&&(
        <Modal title="Naujas vairuotojas" onClose={()=>setAddDrvOpen(false)}>
          <form className="space-y-4" onSubmit={e=>{e.preventDefault();const f=new FormData(e.target);addDriver({name:f.get('name'),phone:f.get('phone'),status:'Namuose',currentCar:'Nėra',startDate:null,plannedReturnDate:null,homeStatus:'Poilsis',readinessDate:todayStr(),companyType:f.get('ct'),specialization:f.get('sp')});}}>
            <Field label="Vardas Pavardė"><input name="name" required placeholder="Vardas Pavardė" className={ic}/></Field>
            <Field label="Telefonas"><input name="phone" required placeholder="+370 ..." className={ic}/></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Įmonė"><select name="ct" required className={sc}><option value="LT">LT</option><option value="PL">PL</option></select></Field>
              <Field label="Tipas"><select name="sp" required className={sc}><option value="Tentas">Tentas</option><option value="Refas">Refas</option><option value="Universalus">Universalus</option></select></Field>
            </div>
            <button type="submit" className="w-full bg-[#CC1427] text-white py-2.5 rounded-xl font-bold text-sm hover:bg-[#aa1020] transition-colors shadow-md">Pridėti</button>
          </form>
        </Modal>
      )}

      {addCarOpen&&(
        <Modal title="Naujas automobilis" onClose={()=>setAddCarOpen(false)}>
          <form className="space-y-4" onSubmit={e=>{e.preventDefault();const f=new FormData(e.target);addCar({number:f.get('number').toUpperCase(),status:'Aktyvus',type:f.get('type'),registration:f.get('reg'),activeFrom:f.get('af')});}}>
            <Field label="Numeris"><input name="number" required placeholder="ABC 123" className={cn(ic,'uppercase font-mono')}/></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Registracija"><select name="reg" required className={sc}><option value="LT">LT</option><option value="PL">PL</option></select></Field>
              <Field label="Tipas"><select name="type" required className={sc}><option value="Tentas">Tentas</option><option value="Refas">Refas</option></select></Field>
            </div>
            <Field label="Aktyvus nuo"><input name="af" type="date" required defaultValue={todayStr()} className={ic}/></Field>
            <button type="submit" className="w-full bg-[#CC1427] text-white py-2.5 rounded-xl font-bold text-sm hover:bg-[#aa1020] transition-colors shadow-md">Pridėti</button>
          </form>
        </Modal>
      )}

      {editCarOpen&&selCarEdit&&(
        <Modal title={`Redaguoti: ${selCarEdit.number}`} onClose={()=>{setEditCarOpen(false);setSelCarEdit(null);}}>
          <form className="space-y-4" onSubmit={e=>{e.preventDefault();const f=new FormData(e.target);updCar(selCarEdit.id,{number:f.get('number'),type:f.get('type'),registration:f.get('reg'),status:f.get('status')});}}>
            <Field label="Numeris"><input name="number" required defaultValue={selCarEdit.number} className={cn(ic,'uppercase')}/></Field>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Registracija"><select name="reg" required defaultValue={selCarEdit.registration} className={sc}><option value="LT">LT</option><option value="PL">PL</option></select></Field>
              <Field label="Tipas"><select name="type" required defaultValue={selCarEdit.type} className={sc}><option value="Tentas">Tentas</option><option value="Refas">Refas</option></select></Field>
            </div>
            <Field label="Būsena"><select name="status" defaultValue={selCarEdit.status} className={sc}><option value="Aktyvus">Aktyvus</option><option value="Remontas">Remontas</option></select></Field>
            <button type="submit" className="w-full bg-[#003087] text-white py-2.5 rounded-xl font-bold text-sm hover:bg-[#004ab5] transition-colors shadow-md">Išsaugoti</button>
          </form>
        </Modal>
      )}

      {tripOpen&&(selDrvTrip||selCarAssign)&&(
        <Modal title={selDrvTrip?`Į reisą: ${selDrvTrip.name}`:`Priskirti: ${selCarAssign}`} onClose={()=>{setTripOpen(false);setSelDrvTrip(null);setSelCarAssign(null);}}>
          <form className="space-y-4" onSubmit={e=>{e.preventDefault();const f=new FormData(e.target);const did=selDrvTrip?.id||f.get('did');const car=selCarAssign||f.get('car');sendToTrip(did,car,f.get('sd'),f.get('rd'));}}>
            {!selDrvTrip&&<Field label="Vairuotojas"><select name="did" required className={sc}><option value="">Pasirinkite...</option>{drivers.filter(d=>d.status==='Namuose').map(d=><option key={d.id} value={d.id}>{d.name} ({d.companyType} • {d.specialization})</option>)}</select></Field>}
            {!selCarAssign&&<Field label="Automobilis"><select name="car" required className={sc}>{cars.map(c=><option key={c.id} value={c.number}>{c.number} ({c.registration} • {c.type})</option>)}</select></Field>}
            <div className="grid grid-cols-2 gap-3">
              <Field label="Pradžia"><input name="sd" type="date" required defaultValue={todayStr()} className={ic}/></Field>
              <Field label="Iki"><input name="rd" type="date" required defaultValue={formatDate(addDays(new Date(),42),'yyyy-MM-dd')} className={ic}/></Field>
            </div>
            <button type="submit" className="w-full bg-[#CC1427] text-white py-2.5 rounded-xl font-bold text-sm hover:bg-[#aa1020] transition-colors shadow-md">Patvirtinti</button>
          </form>
        </Modal>
      )}

      {homeOpen&&selDrvHome&&(
        <Modal title={`Namo: ${selDrvHome.name}`} onClose={()=>{setHomeOpen(false);setSelDrvHome(null);}}>
          <form className="space-y-4" onSubmit={e=>{e.preventDefault();const f=new FormData(e.target);sendHome(selDrvHome.id,f.get('hs'),f.get('rd'));}}>
            <Field label="Būsena namuose"><select name="hs" required className={sc}><option value="Poilsis">Poilsis</option><option value="Tvarko dokumentus">Tvarko dokumentus</option></select></Field>
            <Field label="Gali nuo"><input name="rd" type="date" required defaultValue={formatDate(addDays(new Date(),14),'yyyy-MM-dd')} className={ic}/></Field>
            <button type="submit" className="w-full bg-emerald-600 text-white py-2.5 rounded-xl font-bold text-sm hover:bg-emerald-700 transition-colors">Patvirtinti</button>
          </form>
        </Modal>
      )}

      {editDrvOpen&&selDrvEdit&&(
        <Modal title={`Redaguoti: ${selDrvEdit.name}`} onClose={()=>{setEditDrvOpen(false);setSelDrvEdit(null);}}>
          <form className="space-y-4" onSubmit={e=>{e.preventDefault();const f=new FormData(e.target);updDriver(selDrvEdit.id,{name:f.get('name'),phone:f.get('phone'),status:f.get('status'),currentCar:f.get('car'),startDate:f.get('sd')||null,plannedReturnDate:f.get('rd')||null,homeStatus:f.get('hs'),readinessDate:f.get('redy')||null,companyType:f.get('ct'),specialization:f.get('sp')});setEditDrvOpen(false);showT('Atnaujinta');}}>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Vardas"><input name="name" required defaultValue={selDrvEdit.name} className={ic}/></Field>
              <Field label="Tel."><input name="phone" required defaultValue={selDrvEdit.phone} className={ic}/></Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Įmonė"><select name="ct" required defaultValue={selDrvEdit.companyType} className={sc}><option value="LT">LT</option><option value="PL">PL</option></select></Field>
              <Field label="Tipas"><select name="sp" required defaultValue={selDrvEdit.specialization} className={sc}><option value="Tentas">Tentas</option><option value="Refas">Refas</option><option value="Universalus">Universalus</option></select></Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Būsena"><select name="status" defaultValue={selDrvEdit.status} className={sc}><option value="Reise">Reise</option><option value="Namuose">Namuose</option></select></Field>
              <Field label="Auto"><input name="car" defaultValue={selDrvEdit.currentCar} className={ic}/></Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Pradžia"><input name="sd" type="date" defaultValue={selDrvEdit.startDate||''} className={ic}/></Field>
              <Field label="Grįžta"><input name="rd" type="date" defaultValue={selDrvEdit.plannedReturnDate||''} className={ic}/></Field>
            </div>
            <div className="grid grid-cols-2 gap-3">
              <Field label="Namų būsena"><select name="hs" defaultValue={selDrvEdit.homeStatus} className={sc}><option value="Nėra">Nėra</option><option value="Poilsis">Poilsis</option><option value="Tvarko dokumentus">Tvarko dokumentus</option></select></Field>
              <Field label="Gali nuo"><input name="redy" type="date" defaultValue={selDrvEdit.readinessDate||''} className={ic}/></Field>
            </div>
            <button type="submit" className="w-full bg-[#003087] text-white py-2.5 rounded-xl font-bold text-sm hover:bg-[#004ab5] transition-colors shadow-md">Išsaugoti</button>
          </form>
        </Modal>
      )}

      {selDay&&(
        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 fade-in" onClick={e=>e.target===e.currentTarget&&setSelDay(null)}>
          <div className="bg-white w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden">
            <div className="px-6 py-4 text-white flex items-center justify-between" style={{background:'linear-gradient(135deg,#003087 0%,#004ab5 100%)'}}>
              <div><p className="font-bold">{formatDate(parseISO(selDay),'yyyy MMMM d')}</p><p className="text-xs text-white/50">Dienos planai</p></div>
              <button onClick={()=>setSelDay(null)} className="p-1.5 hover:bg-white/10 rounded-lg text-white/60 hover:text-white">✕</button>
            </div>
            <div className="p-6 space-y-3 max-h-96 overflow-y-auto">
              {plans.filter(p=>p.date===selDay).map(plan=>(
                <div key={plan.id} className="border border-stone-100 rounded-xl p-4">
                  <div className="flex items-center justify-between mb-3">
                    <span className="font-mono font-black bg-stone-900 text-white px-2 py-0.5 rounded text-sm">{plan.carNumber}</span>
                    <Badge v={plan.status==='Suplanuota'?'blue':'green'}>{plan.status}</Badge>
                  </div>
                  <div className="flex items-center justify-between gap-4">
                    <div><p className="text-xs text-red-500 font-bold uppercase mb-0.5">Namo</p><p className="font-semibold text-sm">{plan.leavingDriverName}</p></div>
                    <span className="text-stone-300">→</span>
                    <div className="text-right"><p className="text-xs text-emerald-500 font-bold uppercase mb-0.5">Į reisą</p><p className="font-semibold text-sm">{plan.incomingDriverName}</p></div>
                  </div>
                </div>
              ))}
              {plans.filter(p=>p.date===selDay).length===0&&<p className="text-center text-stone-400 text-sm py-8">Planų nėra</p>}
            </div>
            <div className="px-6 py-4 border-t border-stone-100">
              <button onClick={()=>setSelDay(null)} className="w-full text-white py-2.5 rounded-xl font-bold text-sm" style={{background:'#003087'}}>Uždaryti</button>
            </div>
          </div>
        </div>
      )}

      {confirmData&&(
        <div className="fixed inset-0 bg-[#003087]/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4 fade-in" onClick={e=>e.target===e.currentTarget&&setConfirmData(null)}>
          <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden border border-slate-100">
            <div className="px-6 py-4 border-b border-[#003087]/10 flex items-center justify-between" style={{background:'linear-gradient(135deg,#003087 0%,#004ab5 100%)'}}>
              <h3 className="font-bold text-white">{confirmData.isExecution?'✓ Patvirtinti įvykdymą':'Patvirtinti planą'}</h3>
              <button onClick={()=>setConfirmData(null)} className="p-1.5 hover:bg-white/20 rounded-lg text-white/70 hover:text-white">✕</button>
            </div>
            <div className="p-6 space-y-4">
              <div className="bg-[#003087]/5 border border-[#003087]/10 rounded-xl p-4 space-y-3">
                <div className="flex justify-between text-sm"><span className="text-slate-400">Automobilis</span><span className="font-mono font-black text-[#CC1427]">{confirmData.carNumber}</span></div>
                <div className="flex justify-between text-sm items-center">
                  <span className="text-slate-400">Data</span>
                  {confirmData.isExecution?(
                    <input type="date" className={cn(ic,'w-40 text-right')} value={confirmData.executionDate||confirmData.date} onChange={e=>setConfirmData(p=>p?{...p,executionDate:e.target.value}:null)}/>
                  ):(
                    <span className="font-bold text-[#003087]">{confirmData.date}</span>
                  )}
                </div>
                <div className="pt-2 border-t border-[#003087]/10 flex items-center gap-3">
                  <div className="flex-1"><p className="text-xs text-[#CC1427] font-bold uppercase">🏠 Namo</p><p className="text-sm font-semibold truncate text-[#003087]">{confirmData.leavingId&&confirmData.leavingId!=='NONE'?drivers.find(d=>d.id===confirmData.leavingId)?.name||'—':'Nauja mašina'}</p></div>
                  <span className="text-[#003087]/30 text-lg font-bold">→</span>
                  <div className="flex-1 text-right"><p className="text-xs text-emerald-600 font-bold uppercase">🚚 Į reisą</p><p className="text-sm font-semibold truncate text-[#003087]">{confirmData.driverName}</p></div>
                </div>
              </div>
              <Field label="Dirbs iki (planuojama)">
                <input type="date" className={ic} value={newReturn} onChange={e=>setNewReturn(e.target.value)}/>
              </Field>
            </div>
            <div className="px-6 py-4 border-t border-slate-100 flex gap-3">
              <button onClick={()=>setConfirmData(null)} className="flex-1 py-2.5 border border-slate-200 rounded-xl text-sm font-semibold hover:bg-slate-50 transition-colors text-slate-600">Atšaukti</button>
              <button onClick={()=>{
                if(confirmData.isExecution&&confirmData.planId) completePlan(confirmData.planId,newReturn,confirmData.executionDate);
                else createPlan(confirmData.carNumber,confirmData.leavingId,confirmData.incomingId,confirmData.date,newReturn);
                setConfirmData(null);
              }} className="flex-1 py-2.5 rounded-xl text-sm font-bold text-white transition-colors shadow-md" style={{background:confirmData.isExecution?'#16a34a':'#CC1427'}}>
                {confirmData.isExecution?'Įvykdyta ✓':'Patvirtinti'}
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Toast */}
      {toast&&(
        <div className={cn("fixed bottom-6 right-6 flex items-center gap-3 px-5 py-3 rounded-2xl shadow-2xl z-[100] fade-in",toast.type==='success'?"bg-[#003087] text-white":"bg-[#CC1427] text-white")}>
          <span className="text-lg">{toast.type==='success'?'✓':'!'}</span>
          <span className="text-sm font-semibold">{toast.msg}</span>
          <button onClick={()=>setToast(null)} className="ml-1 opacity-60 hover:opacity-100 text-sm">✕</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
